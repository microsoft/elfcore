name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        features: ["", "--no-default-features"]
        target: ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install deps
      run: ./ci/install_deps.sh
    - name: Add rust target
      run: rustup target add ${{ matrix.target }} || true
    - name: Format
      run: cargo fmt --all -- --check
    - name: Check
      run: cargo check --target ${{ matrix.target }} --all-features --all-targets
    - name: Clippy
      run: cargo clippy --target ${{ matrix.target }} --all-features --all-targets -- -D warnings
    - name: Build
      if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
      run: cargo build --verbose ${{ matrix.features }}
    - name: Run tests
      if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
      run: cargo test --verbose ${{ matrix.features }}
    - name: Run basic dump creation test
      if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
      run: ./ci/test.sh

  miri:
    name: "Miri"
    strategy:
      matrix:
        features: ["", "--no-default-features"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup override set nightly
          cargo miri setup
      - name: Test with Miri
        run: cargo miri test ${{ matrix.features }}
